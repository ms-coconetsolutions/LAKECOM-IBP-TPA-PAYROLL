<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="https://i.ibb.co/r2RTNN7Z/image.png">
  
  <title>LAKECOM IBP</title>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbx7NFKlURp0_K6DSf9D7zJ2CBsV5H2mzsEr-6cFTO2u3vY8vxWrkUmpL2AtOJklV2LvUQ/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
